name: Build Genesis Grid installers

# Builds a native one-click installer for Windows, macOS, and Linux every
# time you push a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# GitHub's own runners install Node + Rust and compile the app — nothing
# needs to be installed on your own machine to produce the .exe.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # lets you trigger a build manually from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libappindicator3-dev librsvg2-dev patchelf build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Genesis Grid ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
